<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savie - Picturi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Italianno&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>

<body class="pagina-picturi">

<header class="main-header">
    <a href="index.html" class="logo">Savie</a>
    <nav>
        <ul class="nav-links">
            <li><a href="picturi.html" class="active">Picturi</a></li>
            <li><a href="obiecte.html">Obiecte</a></li>
            <li><a href="personalizat.html">Personalizat</a></li>
        </ul>
    </nav>
</header>

<div class="full-width-bar">
    <div class="bar-content">

        <div class="dots">
            <span></span><span></span>
            <span></span><span></span>
        </div>

        <span class="bar-title">Picturi</span> 

    </div>
</div>

<main class="content-wrapper">
    <div class="products-grid">

        <a href="#" class="product-card">
            <div class="img-holder"><img src="imagini/pic1.jpg"></div>
            <h3>Îmbrățișarea</h3>
            <p class="price">6 850 lei</p>
        </a>

        <a href="#" class="product-card">
            <div class="img-holder"><img src="imagini/pic2.jpg"></div>
            <h3>Înaintaj de gânduri</h3>
            <p class="price">15 650 lei</p>
        </a>

        <a href="#" class="product-card">
            <div class="img-holder"><img src="imagini/pic4.jpg"></div>
            <h3>Pacea</h3>
            <p class="price">6 600 lei</p>
        </a>

        <a href="#" class="product-card">
            <div class="img-holder"><img src="imagini/pic3.jpg"></div>
            <h3>Magnus</h3>
            <p class="price">11 600 lei</p>
        </a>

        <a href="#" class="product-card">
            <div class="img-holder"><img src="imagini/pic5.jpg"></div>
            <h3>Jeanne</h3>
            <p class="price">10 500 lei</p>
        </a>

        <a href="#" class="product-card">
            <div class="img-holder"><img src="imagini/pic6.jpg"></div>
            <h3>Ciorapii</h3>
            <p class="price">10 000 lei</p>
        </a>

        <a href="#" class="product-card">
            <div class="img-holder"><img src="imagini/pic7.jpg"></div>
            <h3>Tom, nu mai vine...</h3>
            <p class="price">9 000 lei</p>
        </a>

        <a href="#" class="product-card">
            <div class="img-holder"><img src="imagini/pic8.jpg"></div>
            <h3>Eu sunt</h3>
            <p class="price">17 500 lei</p>
        </a>

    </div>
</main>

<!-- MODAL -->
<div id="product-modal" class="modal">

    <div class="modal-layout-container">

        <!-- X -->
        <button class="close-modal">×</button>

        <!-- TOP BAR -->
        <div class="modal-top-bar">
            <div class="breadcrumb-dots">
                <span></span><span></span>
                <span></span><span></span>
            </div>

            <div class="breadcrumb-text">
                <span id="modal-category"></span> > <span id="modal-name"></span>
            </div>
        </div>

        <!-- BODY -->
        <div class="modal-body">

            <!-- STÂNGA: IMAGINE -->
            <div class="product-visual">
                <div class="product-image-border">
                    <img id="modal-img" src="" alt="">
                </div>
                <p id="modal-size"></p>
            </div>

            <!-- DREAPTA: INFO -->
            <div class="product-info-side">

                <!-- SUS: TITLU + DESCRIERE -->
                <div class="top-info">
                    <h2 id="modal-price"></h2>
                    <p id="modal-description"></p>
                </div>

                <!-- CANTITATE -->
                <div class="qty-group">
                    <label>Cantitatea:</label>

                    <div class="qty-custom-wrapper">
                        <button type="button" class="arrow-down">−</button>
                        <input type="number" value="1" min="1" class="qty-input">
                        <button type="button" class="arrow-up">+</button>
                    </div>
                </div>


                <!-- BUTON CUMPĂRĂ -->
                <button class="buy-btn">Cumpără!</button>

            </div>

        </div>
    </div>
</div>

<!-- SCRIPT -->
<script src="hover.js"></script>
</body>
